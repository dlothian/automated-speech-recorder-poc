name: Deploy Angular + Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Cloudflare Pages project name'
        required: true
        default: 'auth0-angular'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize workflow summary
        run: |
          echo "# 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project:** ${{ inputs.project_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          echo "✅ Dependencies installed" >> $GITHUB_STEP_SUMMARY

      - name: Build Angular app
        id: angular_build
        run: |
          npm run build
          echo "## Angular Build" >> $GITHUB_STEP_SUMMARY
          echo "✅ Angular build completed successfully" >> $GITHUB_STEP_SUMMARY

      - name: Install Wrangler
        run: |
          npm install --global wrangler
          echo "## Wrangler" >> $GITHUB_STEP_SUMMARY
          echo "✅ Wrangler installed" >> $GITHUB_STEP_SUMMARY

      #
      # Worker
      #

      - name: Generate Worker types
        id: worker_types
        working-directory: worker
        run: |
          wrangler types
          echo "## Worker Types" >> $GITHUB_STEP_SUMMARY
          echo "✅ Worker types generated" >> $GITHUB_STEP_SUMMARY

      - name: Create or reuse D1 database
        id: d1_database
        working-directory: worker
        run: |
          DATABASE_NAME="auth0-angular-db"

          echo "## D1 Database Setup" >> $GITHUB_STEP_SUMMARY

          echo "Checking if D1 database exists: $DATABASE_NAME"

          DATABASE_ID=$(wrangler d1 list --json | jq -r ".[] | select(.name==\"$DATABASE_NAME\") | .uuid")

          if [ -n "$DATABASE_ID" ] && [ "$DATABASE_ID" != "null" ]; then
            echo "✅ D1 database already exists"
            echo "Using existing database ID: $DATABASE_ID"

            echo "D1 database already exists. Reusing it." >> $GITHUB_STEP_SUMMARY
          else
            echo "Creating D1 database..."

            OUTPUT=$(wrangler d1 create "$DATABASE_NAME")

            echo "$OUTPUT"

            DATABASE_ID=$(echo "$OUTPUT" | grep "database_id" | sed 's/.*"\(.*\)".*/\1/')

            if [ -z "$DATABASE_ID" ]; then
              echo "❌ Could not determine database ID"
              exit 1
            fi

            echo "Created database ID: $DATABASE_ID"

            echo "Created new D1 database." >> $GITHUB_STEP_SUMMARY
          fi

          echo "DATABASE_ID=$DATABASE_ID" >> $GITHUB_ENV

          cat > wrangler.generated.toml <<EOF
          name = "auth0-angular-api"
          main = "src/index.ts"
          compatibility_date = "2026-07-16"

          [[d1_databases]]
          binding = "DB"
          database_name = "$DATABASE_NAME"
          database_id = "$DATABASE_ID"
          EOF

              echo "Generated Worker config:"
              cat wrangler.generated.toml

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        id: migrations
        working-directory: worker
        run: |
          echo "## D1 Migrations" >> $GITHUB_STEP_SUMMARY

          wrangler d1 migrations apply auth0-angular-db \
          --remote \
          --config wrangler.generated.toml | tee migration-output.txt

          echo '```' >> $GITHUB_STEP_SUMMARY
          cat migration-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        id: worker_deploy
        working-directory: worker
        run: |
          echo "## Worker Deployment" >> $GITHUB_STEP_SUMMARY

          wrangler deploy --config wrangler.generated.toml | tee worker-output.txt

          echo '```' >> $GITHUB_STEP_SUMMARY
          cat worker-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      #
      # Pages
      #

      - name: Create or reuse Cloudflare Pages project
        id: pages_project
        run: |
          echo "## Pages Project Setup" >> $GITHUB_STEP_SUMMARY

          PROJECT_NAME="${{ inputs.project_name }}"

          echo "Checking if Pages project exists: $PROJECT_NAME"

          if wrangler pages project list | grep -q "$PROJECT_NAME"; then
            echo "✅ Pages project already exists"
            echo "Project '$PROJECT_NAME' already exists. Will deploy updates." >> $GITHUB_STEP_SUMMARY
          else
            echo "Creating Pages project..."
            
            wrangler pages project create "$PROJECT_NAME" \
              --production-branch main

            echo "✅ Pages project created"
            echo "Created new Pages project '$PROJECT_NAME'." >> $GITHUB_STEP_SUMMARY
          fi

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Angular to Cloudflare Pages
        id: pages_deploy
        run: |
          echo "## Pages Deployment" >> $GITHUB_STEP_SUMMARY

          wrangler pages deploy dist/auth0-angular/browser \
            --project-name "${{ inputs.project_name }}" | tee pages-output.txt

          echo '```' >> $GITHUB_STEP_SUMMARY
          cat pages-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      #
      # Final summary even if something failed
      #

      - name: Final deployment summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Final Status" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the failed step logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
