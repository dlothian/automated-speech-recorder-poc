name: Cloudflare Quota Report

on:
  #   schedule:
  # Run every day at 07:00 UTC
  # - cron: '0 7 * * *'

  # Allow manual runs from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quota-report:
    name: Generate Cloudflare quota report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Generate Cloudflare quota report
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python ops/check_cloudflare_usage.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ops/cloudflare_quota_report.md

          git commit -m "Update Cloudflare quota report" || echo "No changes"

          git push
