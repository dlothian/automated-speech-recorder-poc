name: Deploy Angular + Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Cloudflare Pages project name'
        required: true
        default: 'auth0-angular'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # Angular build
      #
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      #
      # Cloudflare setup
      #
      - name: Install Wrangler
        run: npm install --global wrangler

      #
      # Worker setup
      #
      - name: Generate Worker types
        working-directory: worker
        run: wrangler types

      - name: Create D1 database if needed
        working-directory: worker
        run: |
          wrangler d1 create auth0-angular-db || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        working-directory: worker
        run: |
          wrangler d1 migrations apply auth0-angular-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        working-directory: worker
        run: |
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      #
      # Pages setup
      #
      - name: Create Cloudflare Pages project if needed
        run: |
          wrangler pages project create "${{ inputs.project_name }}" \
            --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Angular to Cloudflare Pages
        run: |
          wrangler pages deploy dist/auth0-angular/browser \
            --project-name "${{ inputs.project_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
